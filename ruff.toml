line-length = 120
target-version = "py311"

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort (import sorting)
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "ANN",  # flake8-annotations
]
ignore = [
    "E501",    # Line length handled by formatter
    "ANN101",  # Deprecated -- no need to annotate 'self'
    "ANN102",  # Deprecated -- no need to annotate 'cls'
    "ANN401",  # Allow typing.Any where needed
]

[lint.isort]
known-first-party = ["powerbi_mcp"]

[lint.per-file-ignores]
"scripts/**" = ["ANN"]
"tests/**" = ["ANN"]

[format]
quote-style = "double"
indent-style = "space"
